name: Build Docker Image

on:
  push:
    branches: [master]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Chart.yaml appVersion
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHART_FILE="charts/trmnl-home-screen-app/Chart.yaml"
          
          # Update appVersion
          sed -i "s/^appVersion: .*/appVersion: ${VERSION}/" "$CHART_FILE"
          
          # Extract current chart version
          CURRENT_VERSION=$(grep '^version:' "$CHART_FILE" | awk '{print $2}')
          # Split semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          # Bump minor and reset patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}" 
          
          # Update chart version
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" "$CHART_FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CHART_FILE"
          git commit -m "chore: bump chart version to ${NEW_VERSION} and set appVersion to ${VERSION}"
          git push origin HEAD:master

      - name: Run chart-releaser
        uses: bitdeps/helm-oci-charts-releaser@v0.1.5
        with:
          charts_dir: charts
          oci_registry: ghcr.io/${{ github.repository }}
          oci_username: ${{ github.actor }}
          oci_password: ${{ secrets.GITHUB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}