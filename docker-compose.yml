services:
  app:
    build: .
    env_file: .env
    environment:
      SCREEN_TEMPLATE_FILE: ${SCREEN_TEMPLATE_FILE:-/app/config/screen.liquid}
      SCREEN_RENDER_INTERVAL_SECONDS: ${SCREEN_RENDER_INTERVAL_SECONDS:-30}
      TRMNL_BASE_URL: ${TRMNL_BASE_URL:-}
      TRMNL_TOKEN: ${TRMNL_TOKEN:-}
      TRMNL_DEVICE_ID: ${TRMNL_DEVICE_ID:-}
      ACCUWEATHER_ENABLED: ${ACCUWEATHER_ENABLED:-false}
      ACCUWEATHER_API_KEY: ${ACCUWEATHER_API_KEY:-}
      ACCUWEATHER_CITY: ${ACCUWEATHER_CITY:-London}
      ACCUWEATHER_FETCH_INTERVAL_MINUTES: ${ACCUWEATHER_FETCH_INTERVAL_MINUTES:-60}
      WEATHERAPI_ENABLED: ${WEATHERAPI_ENABLED:-false}
      WEATHERAPI_API_KEY: ${WEATHERAPI_API_KEY:-}
      WEATHERAPI_CITY: ${WEATHERAPI_CITY:-London}
      WEATHERAPI_FETCH_INTERVAL_MINUTES: ${WEATHERAPI_FETCH_INTERVAL_MINUTES:-60}
      WEATHERAPI_FORECAST_DAYS: ${WEATHERAPI_FORECAST_DAYS:-7}
      CALDAV_ENABLED: ${CALDAV_ENABLED:-false}
      CALDAV_CALENDAR_URL: ${CALDAV_CALENDAR_URL:-}
      CALDAV_AUTH_TYPE: ${CALDAV_AUTH_TYPE:-basic}
      CALDAV_USERNAME: ${CALDAV_USERNAME:-}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-}
      CALDAV_FETCH_INTERVAL_MINUTES: ${CALDAV_FETCH_INTERVAL_MINUTES:-30}
      CALDAV_DAYS_AHEAD: ${CALDAV_DAYS_AHEAD:-7}
      HOME_ASSISTANT_ENABLED: ${HOME_ASSISTANT_ENABLED:-false}
      HOME_ASSISTANT_WEBSOCKET_URL: ${HOME_ASSISTANT_WEBSOCKET_URL:-}
      HOME_ASSISTANT_ACCESS_TOKEN: ${HOME_ASSISTANT_ACCESS_TOKEN:-}
      HOME_ASSISTANT_SUBSCRIBED_ENTITY_IDS: ${HOME_ASSISTANT_SUBSCRIBED_ENTITY_IDS:-}
      HOME_ASSISTANT_MAX_FRAME_SIZE_KB: ${HOME_ASSISTANT_MAX_FRAME_SIZE_KB:-1024}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: ${TZ:-UTC}
    tmpfs:
      - /tmp
