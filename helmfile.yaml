repositories:
  - name: trmnl
    url: oci://ghcr.io/jvalskis/helm-charts

environments:
  production:
    values:
      - controllers:
          main:
            containers:
              main:
                image:
                  tag: latest
                env:
                  ACCUWEATHER_ENABLED: "true"
                  ACCUWEATHER_CITY: "London"
                  ACCUWEATHER_FETCH_INTERVAL_MINUTES: "60"
                  ACCUWEATHER_API_KEY:
                    valueFrom:
                      secretKeyRef:
                        name: trmnl-accuweather
                        key: ACCUWEATHER_API_KEY
                  CALDAV_ENABLED: "true"
                  CALDAV_CALENDAR_URL: "https://nextcloud.example.com/remote.php/dav/calendars/user/personal/"
                  CALDAV_AUTH_TYPE: "basic"
                  CALDAV_USERNAME: "user"
                  CALDAV_FETCH_INTERVAL_MINUTES: "30"
                  CALDAV_DAYS_AHEAD: "7"
                  CALDAV_PASSWORD:
                    valueFrom:
                      secretKeyRef:
                        name: trmnl-caldav
                        key: CALDAV_PASSWORD
                  HOME_ASSISTANT_ENABLED: "false"
                  HOME_ASSISTANT_WEBSOCKET_URL: "wss://homeassistant.local/api/websocket"
                  HOME_ASSISTANT_SUBSCRIBED_ENTITY_IDS: ""
                  HOME_ASSISTANT_MAX_FRAME_SIZE_KB: "1024"
                  HOME_ASSISTANT_ACCESS_TOKEN:
                    valueFrom:
                      secretKeyRef:
                        name: trmnl-home-assistant
                        key: HOME_ASSISTANT_ACCESS_TOKEN

releases:
  - name: trmnl-home-screen-app
    chart: oci://ghcr.io/jvalskis/helm-charts/trmnl-home-screen-app
    version: 0.1.0
    values:
      - controllers:
          main:
            containers:
              main:
                image:
                  tag: {{ .Values | get "controllers.main.containers.main.image.tag" "" | quote }}
                env:
                  ACCUWEATHER_ENABLED: {{ .Values | get "controllers.main.containers.main.env.ACCUWEATHER_ENABLED" "true" | quote }}
                  ACCUWEATHER_CITY: {{ .Values | get "controllers.main.containers.main.env.ACCUWEATHER_CITY" "London" | quote }}
                  ACCUWEATHER_FETCH_INTERVAL_MINUTES: {{ .Values | get "controllers.main.containers.main.env.ACCUWEATHER_FETCH_INTERVAL_MINUTES" "60" | quote }}
                  CALDAV_ENABLED: {{ .Values | get "controllers.main.containers.main.env.CALDAV_ENABLED" "true" | quote }}
                  CALDAV_CALENDAR_URL: {{ .Values | get "controllers.main.containers.main.env.CALDAV_CALENDAR_URL" "" | quote }}
                  CALDAV_AUTH_TYPE: {{ .Values | get "controllers.main.containers.main.env.CALDAV_AUTH_TYPE" "basic" | quote }}
                  CALDAV_USERNAME: {{ .Values | get "controllers.main.containers.main.env.CALDAV_USERNAME" "user" | quote }}
                  CALDAV_FETCH_INTERVAL_MINUTES: {{ .Values | get "controllers.main.containers.main.env.CALDAV_FETCH_INTERVAL_MINUTES" "30" | quote }}
                  CALDAV_DAYS_AHEAD: {{ .Values | get "controllers.main.containers.main.env.CALDAV_DAYS_AHEAD" "7" | quote }}
                  HOME_ASSISTANT_ENABLED: {{ .Values | get "controllers.main.containers.main.env.HOME_ASSISTANT_ENABLED" "false" | quote }}
                  HOME_ASSISTANT_WEBSOCKET_URL: {{ .Values | get "controllers.main.containers.main.env.HOME_ASSISTANT_WEBSOCKET_URL" "" | quote }}
                  HOME_ASSISTANT_SUBSCRIBED_ENTITY_IDS: {{ .Values | get "controllers.main.containers.main.env.HOME_ASSISTANT_SUBSCRIBED_ENTITY_IDS" "" | quote }}
                  HOME_ASSISTANT_MAX_FRAME_SIZE_KB: {{ .Values | get "controllers.main.containers.main.env.HOME_ASSISTANT_MAX_FRAME_SIZE_KB" "1024" | quote }}
