defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsUser: 1001
    runAsNonRoot: true

controllers:
  main:
    strategy: Recreate
    containers:
      main:
        image:
          repository: ghcr.io/jvalskis/trmnl-home-screen
          tag: "{{.Chart.AppVersion}}"
          pullPolicy: IfNotPresent
        env:
          TZ: UTC
          ACCUWEATHER_ENABLED: "false"
          ACCUWEATHER_API_KEY: YOUR_API_KEY
          ACCUWEATHER_CITY: "London"
          ACCUWEATHER_FETCH_INTERVAL_MINUTES: "60"
          WEATHERAPI_ENABLED: "false"
          WEATHERAPI_API_KEY: YOUR_WEATHERAPI_KEY
          WEATHERAPI_CITY: "London"
          WEATHERAPI_FETCH_INTERVAL_MINUTES: "60"
          CALDAV_ENABLED: "false"
          CALDAV_CALENDAR_URL: "https://nextcloud.example.com/remote.php/dav/calendars/user/personal/"
          CALDAV_AUTH_TYPE: "basic"
          CALDAV_USERNAME: "user"
          CALDAV_PASSWORD: "app-password"
          CALDAV_FETCH_INTERVAL_MINUTES: "30"
          CALDAV_DAYS_AHEAD: "7"
          HOME_ASSISTANT_ENABLED: "false"
          HOME_ASSISTANT_WEBSOCKET_URL: "wss://home-assistant.local/api/websocket"
          HOME_ASSISTANT_ACCESS_TOKEN: YOUR_HA_TOKEN
          # Comma separated list of entities
          HOME_ASSISTANT_SUBSCRIBED_ENTITY_IDS: ""
          HOME_ASSISTANT_MAX_FRAME_SIZE_KB: "1024"
          TRMNL_BASE_URL: "http://trmnl_byos.local:4567"
          TRMNL_TOKEN: "token"
          TRMNL_DEVICE_ID: 1
          # ALL, FATAL, ERROR, WARN, INFO, DEBUG, TRACE, OFF
          LOG_LEVEL: INFO
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8080

persistence:
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
